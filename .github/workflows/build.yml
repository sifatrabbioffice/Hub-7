name: GameHub Production Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build IPA
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

     
      - name: Generate Source Files and Directory Structure
        run: |
          # 1. Create the project directory
          mkdir -p GameHub
          
          # 2. Create a basic Info.plist file required by Xcode
          cat <<EOF > GameHub/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleDevelopmentRegion</key>
              <string>en</string>
              <key>CFBundleExecutable</key>
              <string>\$(EXECUTABLE_NAME)</string>
              <key>CFBundleIdentifier</key>
              <string>\$(PRODUCT_BUNDLE_IDENTIFIER)</string>
              <key>CFBundleInfoDictionaryVersion</key>
              <string>6.0</string>
              <key>CFBundleName</key>
              <string>\$(PRODUCT_NAME)</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
              <key>UILaunchStoryboardName</key>
              <string>LaunchScreen</string>
              <key>UIRequiredDeviceCapabilities</key>
              <array>
                  <string>arm64</string>
              </array>
              <key>UISupportedInterfaceOrientations</key>
              <array>
                  <string>UIInterfaceOrientationLandscapeLeft</string>
                  <string>UIInterfaceOrientationLandscapeRight</string>
              </array>
          </dict>
          </plist>
          EOF

          # 3. Verify the file exists for the logs
          ls -R GameHub/
          
          # 4. Now run XcodeGen to link this file to the project
          xcodegen generate


      - name: Archive Project
        run: |
          # We use -archivePath to force a known location
          xcodebuild archive \
            -scheme GameHub \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/App.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Export IPA
        run: |
          # 1. Prepare the Payload folder
          mkdir -p build/Payload
          
          # 2. Dynamically find the .app bundle inside the archive
          # This works regardless of the project or scheme name
          APP_PATH=$(find build/App.xcarchive -name "*.app" -type d | head -n 1)
          
          if [ -z "$APP_PATH" ]; then
            echo "Error: .app bundle not found in archive."
            exit 1
          fi
          
          echo "Found App at: $APP_PATH"
          
          # 3. Copy app to Payload and fix execution bits
          cp -r "$APP_PATH" build/Payload/
          
          # 4. Create the final ZIP/IPA
          cd build
          zip -rq GameHub_Build.ipa Payload
          
      - name: Upload to GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: iOS-IPA-Package
          path: build/GameHub_Build.ipa
      - name: Archive Project
        run: |
          # We use -archivePath to force a known location
          xcodebuild archive \
            -scheme GameHub \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/App.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

     
