name: GameHub Production Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build IPA
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Generate Source Files
        run: |
          mkdir -p GameHub
          # Scripts to create App.swift and Info.plist go here (as provided above)
          xcodegen generate

      - name: Build Archive
        run: |
          xcodebuild archive \
            -project GameHub.xcodeproj \
            -scheme GameHub \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/GameHub.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Export IPA
        run: |
          mkdir -p build/Payload
          cp -r build/GameHub.xcarchive/Products/Applications/*.app build/Payload/
          cd build
          zip -qr GameHub_Final.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GameHub-Pro-Build
          path: build/GameHub_Final.ipa
