name: GameHub Production Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build IPA
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

     
      - name: Generate Source Files and Directory Structure
        run: |
          # 1. Create the project directory
          mkdir -p GameHub
          
          # 2. Create a basic Info.plist file required by Xcode
          cat <<EOF > GameHub/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleDevelopmentRegion</key>
              <string>en</string>
              <key>CFBundleExecutable</key>
              <string>\$(EXECUTABLE_NAME)</string>
              <key>CFBundleIdentifier</key>
              <string>\$(PRODUCT_BUNDLE_IDENTIFIER)</string>
              <key>CFBundleInfoDictionaryVersion</key>
              <string>6.0</string>
              <key>CFBundleName</key>
              <string>\$(PRODUCT_NAME)</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
              <key>UILaunchStoryboardName</key>
              <string>LaunchScreen</string>
              <key>UIRequiredDeviceCapabilities</key>
              <array>
                  <string>arm64</string>
              </array>
              <key>UISupportedInterfaceOrientations</key>
              <array>
                  <string>UIInterfaceOrientationLandscapeLeft</string>
                  <string>UIInterfaceOrientationLandscapeRight</string>
              </array>
          </dict>
          </plist>
          EOF

          # 3. Verify the file exists for the logs
          ls -R GameHub/
          
          # 4. Now run XcodeGen to link this file to the project
          xcodegen generate


      - name: Build Archive
        run: |
          xcodebuild archive \
            -project GameHub.xcodeproj \
            -scheme GameHub \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/GameHub.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Export IPA
        run: |
          # 1. Prepare Payload
          mkdir -p build/Payload
          cp -r build/GameHub.xcarchive/Products/Applications/*.app build/Payload/
          
          # 2. Debug: List contents to see exactly what was built
          APP_PATH=$(find build/Payload -name "*.app" | head -n 1)
          echo "Listing contents of $APP_PATH:"
          ls -R "$APP_PATH"
          
          # 3. Robustly find the Mach-O binary
          # We search for files and check if they are "executable" or Mach-O format
          echo "Searching for the main binary..."
          EXECUTABLE_PATH=$(find "$APP_PATH" -maxdepth 1 -type f -perm +111 -not -name "*.plist" -not -name "*.png" | head -n 1)

          # Fallback: If perm check fails, find the largest file in the root of .app
          if [ -z "$EXECUTABLE_PATH" ]; then
             EXECUTABLE_PATH=$(ls -S "$APP_PATH" | head -n 1)
             EXECUTABLE_PATH="$APP_PATH/$EXECUTABLE_PATH"
          fi

          if [ -f "$EXECUTABLE_PATH" ]; then
            echo "Identified binary at: $EXECUTABLE_PATH"
            chmod +x "$EXECUTABLE_PATH"
          else
            echo "Error: Could not locate binary in $APP_PATH"
            exit 1
          fi
          
          # 4. Final Packaging
          cd build
          zip -r9 GameHub_Final.ipa Payload










      


        
   
