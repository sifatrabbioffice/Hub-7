name: GameHub Production Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build IPA
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

     
      - name: Generate Source Files and Directory Structure
        run: |
          # 1. Create the project directory
          mkdir -p GameHub
          
          # 2. Create a basic Info.plist file required by Xcode
          cat <<EOF > GameHub/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleDevelopmentRegion</key>
              <string>en</string>
              <key>CFBundleExecutable</key>
              <string>\$(EXECUTABLE_NAME)</string>
              <key>CFBundleIdentifier</key>
              <string>\$(PRODUCT_BUNDLE_IDENTIFIER)</string>
              <key>CFBundleInfoDictionaryVersion</key>
              <string>6.0</string>
              <key>CFBundleName</key>
              <string>\$(PRODUCT_NAME)</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
              <key>UILaunchStoryboardName</key>
              <string>LaunchScreen</string>
              <key>UIRequiredDeviceCapabilities</key>
              <array>
                  <string>arm64</string>
              </array>
              <key>UISupportedInterfaceOrientations</key>
              <array>
                  <string>UIInterfaceOrientationLandscapeLeft</string>
                  <string>UIInterfaceOrientationLandscapeRight</string>
              </array>
          </dict>
          </plist>
          EOF

          # 3. Verify the file exists for the logs
          ls -R GameHub/
          
          # 4. Now run XcodeGen to link this file to the project
          xcodegen generate


      - name: Build Archive
        run: |
          xcodebuild archive \
            -project GameHub.xcodeproj \
            -scheme GameHub \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/GameHub.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Export IPA
        run: |
          # 1. Create a clean Payload directory
          mkdir -p build/Payload
          
          # 2. Search for any .app bundle inside the build folder
          # This avoids errors if the archive name is different (WinHub vs GameHub)
          APP_PATH=$(find build -name "*.app" -type d | head -n 1)
          
          if [ -n "$APP_PATH" ]; then
            echo "Found App Bundle at: $APP_PATH"
            # 3. Copy the found .app into the Payload folder
            cp -r "$APP_PATH" build/Payload/
          else
            echo "Error: No .app bundle found in the build directory."
            # List files to help debug if it fails
            ls -R build
            exit 1
          fi
          
          # 4. Create the IPA
          cd build
          zip -qr WinHub_Final.ipa Payload











      


        
   
