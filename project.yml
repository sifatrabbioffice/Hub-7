name: GameHub
targets:
  GameHub:
    type: bundle.application
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - path: GameHub
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.gamehub.emulator.pro
      INFOPLIST_FILE: GameHub/Info.plist
      # Ensure Swift version is set to avoid the preview warnings seen in your logs
      SWIFT_VERSION: 5.0
